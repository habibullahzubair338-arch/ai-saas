<!DOCTYPE html>
<html>
<head>
<title>AI SaaS</title>
<style>
body{
background:#0b0f19;
color:white;
font-family:Arial;
text-align:center;
}

.chat{
width:400px;
margin:auto;
height:60vh;
overflow:auto;
border:1px solid #333;
padding:10px;
}

input{
width:300px;
padding:10px;
}

button{
padding:10px;
background:#38bdf8;
border:none;
cursor:pointer;
}
</style>
</head>

<body>

<h2>🤖 AI SaaS</h2>

<div class="chat" id="chat"></div>

<input id="msg" placeholder="Ask AI...">
<button onclick="send()">Send</button>

<script>
async function send(){
let msg = document.getElementById("msg").value;
let chat = document.getElementById("chat");

chat.innerHTML += `<p><b>You:</b> ${msg}</p>`;

let res = await fetch("/ai", {
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:msg})
});

let data = await res.json();

chat.innerHTML += `<p><b>AI:</b> ${data.reply}</p>`;
}
</script>

</body>
</html>
